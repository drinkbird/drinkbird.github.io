<!doctype html>
<html lang="en">
  <head>
  {% include head.html %}
  {% include open-graph.html %}
  </head>
  <body{% if page.page-key == 'courses' %} class="course-page"{% endif %}>
  {% include header.html %}
  {{ content }}
  {% include footer.html %}

  <pagefind-modal></pagefind-modal>
  <script>
  (function () {
    var trigger = document.querySelector('.nav-search a');
    var modal = document.querySelector('pagefind-modal');
    if (!trigger || !modal) return;
    trigger.addEventListener('click', function (e) {
      // Modifier / middle click still navigates to /search/ in a new tab.
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
      e.preventDefault();
      // Wait for the custom element to be upgraded before calling open().
      customElements.whenDefined('pagefind-modal').then(function () {
        modal.open();
      });
    });
  })();
  </script>
  </body>
  {% include scripts.html %}
</html>
