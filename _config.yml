# Site settings
title: DrinkBird
email: tasos@drinkbird.com
description: "Transforming engineers into leaders"
longdescription: "Transforming engineers into leaders. An engineering leadership blog by Tasos Piotopoulos: articles, courses, and resources on the craft of building software and leading the people who build it."
baseurl: ""
url: "https://blog.drinkbird.com"
locale: en_US

collections:
  books:
    output: true
    permalink: /books/:name
  courses:
    output: true
    permalink: /courses/:path/

defaults:
  -
    scope:
      path: ""
    values:
      layout: "post"
  -
    scope:
      path: ""
      type: "books"
    values:
      layout: "book-collection"
  -
    scope:
      path: ""
      type: "courses"
    values:
      layout: "course-chapter"
      page-key: "courses"
      excerpt: ""

# Build settings
markdown: kramdown
kramdown:
    input: GFM
    syntax_highlighter: rouge

permalink: /:title
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed

exclude: [node_modules]
include: [.well-known]

links:
  - title: Stories
    url: /posts/
    page-key: posts
  - title: Courses
    url: /courses/
    page-key: courses
  - title: Books
    url: /books/
    page-key: books
  - title: Projects
    url: /projects/
    page-key: projects
  - title: About
    url: /about/
    page-key: about

