{% if site.owner.disqus-shortname %}
<div id="disqus_thread"></div>
<script type="text/javascript">
(function() {
  function loadDisqus() {
    var disqus_shortname = '{{ site.owner.disqus-shortname }}';

    {% if page.chapter_title %}
      {% capture disqus_title %}{{ page.chapter_title }} | {{ site.title }}{% endcapture %}
    {% elsif page.title %}
      {% capture disqus_title %}{{ page.title }} | {{ site.title }}{% endcapture %}
    {% else %}
      {% assign disqus_title = site.title %}
    {% endif %}
    {% assign disqus_identifier = page.permalink | default: page.url %}
    window.disqus_config = function () {
      this.page.url = {{ site.url | append: site.baseurl | append: page.url | jsonify }};
      this.page.identifier = {{ disqus_identifier | jsonify }};
      this.page.title = {{ disqus_title | jsonify }};
    };

    var dsq = document.createElement('script');
    dsq.type = 'text/javascript';
    dsq.async = true;
    dsq.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
    (document.head || document.body).appendChild(dsq);

    var count = document.createElement('script');
    count.type = 'text/javascript';
    count.async = true;
    count.src = 'https://' + disqus_shortname + '.disqus.com/count.js';
    (document.head || document.body).appendChild(count);
  }
  document.addEventListener('drinkbird:consent-granted', loadDisqus, { once: true });
})();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
{% endif %}
