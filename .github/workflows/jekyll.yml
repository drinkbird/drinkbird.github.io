name: Build and deploy site

# Resolves issue #34. Replaces the default "Deploy from a branch" GitHub Pages
# flow with a proper Actions pipeline so that `npm run uglify`, Bundler caching,
# and (later) any non-safelisted Jekyll plugin can run as part of the deploy.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Force JS-based actions onto Node 24 ahead of the June 2026 default switch.
# The actions we use (checkout, setup-node, configure-pages, upload-pages-artifact,
# deploy-pages) still declare Node 20 in their action.yml; this overrides that
# per the deprecation notice on the runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Allow one concurrent deploy. Don't cancel an in-flight production deploy if
# another push lands; queue the new one behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        # `npm ci` also runs `npm run uglify` via the postinstall hook, so
        # there's no separate uglify step.
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Build Pagefind search index
        # Walks _site/, builds a compressed/chunked search index into
        # _site/pagefind/. The /search/ page loads this client-side.
        run: npx -y pagefind --site _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
